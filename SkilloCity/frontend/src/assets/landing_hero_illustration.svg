<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="grad1" x1="0" y1="0" x2="800" y2="600" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#3B2FCC" stop-opacity="0.1"/>
            <stop offset="1" stop-color="#FF6B35" stop-opacity="0.1"/>
        </linearGradient>
        <linearGradient id="grad2" x1="400" y1="0" x2="400" y2="600" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
            <stop offset="1" stop-color="#ffffff" stop-opacity="0.2"/>
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="20" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="800" height="600" fill="url(#grad1)"/>
    
    <!-- Abstract Shapes -->
    <circle cx="200" cy="200" r="150" fill="#3B2FCC" fill-opacity="0.1"/>
    <circle cx="600" cy="400" r="200" fill="#FF6B35" fill-opacity="0.1"/>
    
    <!-- Laptop/Screen Representation -->
    <rect x="150" y="150" width="500" height="300" rx="20" fill="white" fill-opacity="0.1" stroke="white" stroke-width="2"/>
    <rect x="200" y="200" width="400" height="200" rx="10" fill="url(#grad2)"/>
    
    <!-- Floating Elements -->
    <circle cx="650" cy="150" r="40" fill="#FF6B35" fill-opacity="0.8" filter="url(#glow)"/>
    <rect x="100" y="450" width="80" height="80" rx="20" fill="#3B2FCC" fill-opacity="0.8" filter="url(#glow)" transform="rotate(45 140 490)"/>
    
    <!-- Text Lines -->
    <rect x="220" y="230" width="200" height="20" rx="10" fill="white" fill-opacity="0.4"/>
    <rect x="220" y="270" width="300" height="20" rx="10" fill="white" fill-opacity="0.2"/>
    <rect x="220" y="310" width="250" height="20" rx="10" fill="white" fill-opacity="0.2"/>
    
    <!-- Connection Lines -->
    <path d="M100 100 Q 400 50 700 100" stroke="white" stroke-width="2" stroke-dasharray="10 10" opacity="0.3"/>
    <path d="M100 500 Q 400 550 700 500" stroke="white" stroke-width="2" stroke-dasharray="10 10" opacity="0.3"/>
</svg>
